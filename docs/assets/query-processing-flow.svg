<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">First Aid AI Chatbot Query Processing Flow</title>
  <desc id="desc">A vertical flowchart showing the chatbot processing pipeline from user query to cited response.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #18324a; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #516274; }
      .box { fill: #f8fbff; stroke: #4f6f8f; stroke-width: 2; }
      .text { font: 600 22px Arial, Helvetica, sans-serif; fill: #1f2d3d; text-anchor: middle; dominant-baseline: middle; }
      .arrow { stroke: #4f6f8f; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#4f6f8f" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="900" />

  <text class="title" x="600" y="55">First Aid AI Chatbot Query Processing Flow</text>
  <text class="subtitle" x="600" y="88" text-anchor="middle">Report-ready diagram for the retrieval-first response pipeline</text>

  <rect class="box" x="330" y="130" rx="20" ry="20" width="540" height="76" />
  <text class="text" x="600" y="168">User enters query</text>

  <path class="arrow" d="M600 206 L600 252" />

  <rect class="box" x="330" y="252" rx="20" ry="20" width="540" height="76" />
  <text class="text" x="600" y="290">System processes input</text>

  <path class="arrow" d="M600 328 L600 374" />

  <rect class="box" x="330" y="374" rx="20" ry="20" width="540" height="76" />
  <text class="text" x="600" y="412">Check for emergency keywords</text>

  <path class="arrow" d="M600 450 L600 496" />

  <rect class="box" x="330" y="496" rx="20" ry="20" width="540" height="76" />
  <text class="text" x="600" y="526">Retrieve relevant documents</text>
  <text class="text" x="600" y="552">(TF-IDF)</text>

  <path class="arrow" d="M600 572 L600 618" />

  <rect class="box" x="330" y="618" rx="20" ry="20" width="540" height="76" />
  <text class="text" x="600" y="656">Generate response</text>

  <path class="arrow" d="M600 694 L600 740" />

  <rect class="box" x="330" y="740" rx="20" ry="20" width="540" height="76" />
  <text class="text" x="600" y="778">Display response with citations</text>
</svg>
