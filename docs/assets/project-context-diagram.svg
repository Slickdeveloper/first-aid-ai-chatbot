<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">First Aid AI Chatbot Project Context Diagram</title>
  <desc id="desc">A context diagram showing the First Aid AI Chatbot system, end users, admins, approved medical sources, and an optional OpenAI service.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #18324a; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #516274; }
      .systemBox { fill: #eef6ff; stroke: #2f5d86; stroke-width: 3; }
      .entityBox { fill: #fbfcfe; stroke: #6b7f95; stroke-width: 2; }
      .optionalBox { fill: #faf7ff; stroke: #7a61b8; stroke-width: 2; stroke-dasharray: 10 8; }
      .heading { font: 700 24px Arial, Helvetica, sans-serif; fill: #18324a; text-anchor: middle; }
      .body { font: 400 18px Arial, Helvetica, sans-serif; fill: #243746; text-anchor: middle; }
      .small { font: 400 15px Arial, Helvetica, sans-serif; fill: #516274; text-anchor: middle; }
      .arrow { stroke: #506b87; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .label { font: 600 16px Arial, Helvetica, sans-serif; fill: #2d4c68; text-anchor: middle; }
      .labelLight { font: 600 16px Arial, Helvetica, sans-serif; fill: #6d53af; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#506b87" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900" />

  <text class="title" x="700" y="52">First Aid AI Chatbot Context Diagram</text>
  <text class="subtitle" x="700" y="84" text-anchor="middle">External actors and information flows around the deployed project</text>

  <rect class="systemBox" x="425" y="220" rx="24" ry="24" width="550" height="300" />
  <text class="heading" x="700" y="280">First Aid AI Chatbot System</text>
  <text class="body" x="700" y="330">React frontend + FastAPI backend</text>
  <text class="body" x="700" y="366">TF-IDF retrieval + SQLite demo database</text>
  <text class="body" x="700" y="402">Chat API, admin API, safety checks</text>
  <text class="body" x="700" y="438">Grounded responses with citations</text>
  <text class="small" x="700" y="480">Hosted as a public web application for the final-year project demo</text>

  <rect class="entityBox" x="80" y="260" rx="20" ry="20" width="250" height="130" />
  <text class="heading" x="205" y="315">End User</text>
  <text class="body" x="205" y="355">Asks first-aid</text>
  <text class="body" x="205" y="383">questions in the chat UI</text>

  <rect class="entityBox" x="1070" y="260" rx="20" ry="20" width="250" height="150" />
  <text class="heading" x="1195" y="315">Admin</text>
  <text class="body" x="1195" y="355">Signs in with</text>
  <text class="body" x="1195" y="383">ADMIN_API_KEY</text>
  <text class="body" x="1195" y="411">and manages sources</text>

  <rect class="entityBox" x="420" y="610" rx="20" ry="20" width="560" height="150" />
  <text class="heading" x="700" y="665">Approved Medical Sources</text>
  <text class="body" x="700" y="705">IFRC, WHO, American Red Cross, Mayo Clinic</text>
  <text class="body" x="700" y="733">Reviewed content is stored in data/sources and ingested for retrieval</text>

  <rect class="optionalBox" x="1070" y="610" rx="20" ry="20" width="250" height="130" />
  <text class="heading" x="1195" y="665">OpenAI API</text>
  <text class="body" x="1195" y="705">Optional service for</text>
  <text class="body" x="1195" y="733">future non-mock responses</text>

  <path class="arrow" d="M330 325 L425 325" />
  <path class="arrow" d="M425 370 L330 370" />
  <text class="label" x="378" y="309">User query</text>
  <text class="label" x="378" y="394">Guidance + citations</text>

  <path class="arrow" d="M975 325 L1070 325" />
  <path class="arrow" d="M1070 380 L975 380" />
  <text class="label" x="1022" y="309">Source management requests</text>
  <text class="label" x="1022" y="404">Approved source status</text>

  <path class="arrow" d="M700 520 L700 610" />
  <text class="label" x="700" y="575">Approved content ingestion and retrieval</text>

  <path class="arrow" d="M975 655 L1070 655" />
  <text class="labelLight" x="1022" y="638">Optional model integration</text>
</svg>
