version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: sqlite:////app/first_aid_chatbot.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:8080,http://127.0.0.1:8080
      ALLOW_MOCK_RESPONSES: "true"
      ADMIN_API_KEY: demo-admin-key-change-me
    ports:
      - "8000:8000"
    volumes:
      - chatbot_data:/app

  web:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  chatbot_data:
